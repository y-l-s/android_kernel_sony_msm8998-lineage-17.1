name: Build Kernel for Sony XZ1 Compact (lilac)

on:
  push:
    branches: [ main, lineage-17.1 ]
  workflow_dispatch:

env:
  ARCH: arm64
  SUBARCH: arm64
  TARGET_DEVICE: lilac
  KERNEL_DEFCONFIG: lineage-msm8998-yoshino-lilac_defconfig

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout kernel source
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
        
    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          bc bison build-essential ccache curl flex \
          git gzip libncurses5 libssl-dev libxml2 \
          lzop make pngcrush python3 schedtool \
          squashfs-tools xsltproc zip unzip \
          u-boot-tools device-tree-compiler libelf-dev \
          cpio kmod rsync
        
    - name: Download AOSP GCC 4.9 toolchains
      run: |
        mkdir -p toolchains
        cd toolchains
        
        echo "Downloading aarch64 toolchain..."
        wget -q https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9/archive/refs/heads/lineage-17.1.tar.gz -O aarch64.tar.gz
        tar -xzf aarch64.tar.gz
        mv android_prebuilts_gcc_linux-x86_aarch64_aarch64-linux-android-4.9-lineage-17.1 aarch64-linux-android-4.9
        rm aarch64.tar.gz
        
        echo "Downloading arm32 toolchain..."
        wget -q https://github.com/LineageOS/android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9/archive/refs/heads/lineage-17.1.tar.gz -O arm.tar.gz
        tar -xzf arm.tar.gz
        mv android_prebuilts_gcc_linux-x86_arm_arm-linux-androideabi-4.9-lineage-17.1 arm-linux-androideabi-4.9
        rm arm.tar.gz
        
        echo "Toolchains downloaded"
        ls -la
        
    - name: Setup build variables
      run: |
        TOOLCHAIN_PATH="$PWD/toolchains"
        echo "CROSS_COMPILE=$TOOLCHAIN_PATH/aarch64-linux-android-4.9/bin/aarch64-linux-android-" >> $GITHUB_ENV
        echo "CROSS_COMPILE_ARM32=$TOOLCHAIN_PATH/arm-linux-androideabi-4.9/bin/arm-linux-androideabi-" >> $GITHUB_ENV
        
        $TOOLCHAIN_PATH/aarch64-linux-android-4.9/bin/aarch64-linux-android-gcc --version
        
    - name: Build kernel
      run: |
        make ${{ env.KERNEL_DEFCONFIG }}
        make -j$(nproc) 2>&1 | tee build.log
        
    - name: Check build result
      run: |
        echo "=== Build Log (last 50 lines) ==="
        tail -50 build.log
        
        if [ -f "arch/arm64/boot/Image.gz-dtb" ]; then
          echo "Build successful!"
          ls -lh arch/arm64/boot/Image.gz-dtb
        else
          echo "Build failed - no kernel image generated"
          exit 1
        fi
        
    - name: Upload kernel artifacts
      uses: actions/upload-artifact@v4
      with:
        name: kernel-${{ env.TARGET_DEVICE }}
        path: |
          arch/arm64/boot/Image.gz-dtb
          build.log
          .config
        retention-days: 7
