name: Build Kernel for Sony XZ1 Compact (lilac)

on:
  push:
    branches: [ main, lineage-17.1 ]
  workflow_dispatch:

env:
  ARCH: arm64
  SUBARCH: arm64
  TARGET_DEVICE: lilac
  KERNEL_DEFCONFIG: lineage-msm8998-yoshino-lilac_defconfig

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout kernel source
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
        
    - name: Install build tools and toolchains
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          bc bison build-essential ccache curl flex \
          gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
          gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf \
          git gzip libncurses5 libssl-dev libxml2 \
          lzop make pngcrush python3 schedtool \
          squashfs-tools xsltproc zip unzip \
          u-boot-tools device-tree-compiler libelf-dev \
          cpio kmod
        
    - name: Setup build variables
      run: |
        echo "ARCH=arm64" >> $GITHUB_ENV
        echo "SUBARCH=arm64" >> $GITHUB_ENV
        echo "CROSS_COMPILE=aarch64-linux-gnu-" >> $GITHUB_ENV
        echo "CROSS_COMPILE_ARM32=arm-linux-gnueabihf-" >> $GITHUB_ENV
        
    - name: Generate vdso.lds manually
      run: |
        cpp -P -C -Uarm64 -D__ASSEMBLY__ -Iarch/arm64/include -Iinclude -Iarch/arm64/include/uapi -Iinclude/uapi \
          arch/arm64/kernel/vdso/vdso.lds.S > arch/arm64/kernel/vdso/vdso.lds || true
        
        if [ -f arch/arm64/kernel/vdso32/vdso.lds.S ]; then
          cpp -P -C -Uarm -D__ASSEMBLY__ -Iarch/arm/include -Iinclude -Iarch/arm/include/uapi -Iinclude/uapi \
            arch/arm64/kernel/vdso32/vdso.lds.S > arch/arm64/kernel/vdso32/vdso.lds || true
        fi
        
        echo "Generated vdso.lds files"
        ls -la arch/arm64/kernel/vdso/vdso.lds 2>/dev/null || echo "vdso.lds not found"
        
    - name: Build kernel
      run: |
        make ${{ env.KERNEL_DEFCONFIG }}
        make -j$(nproc) 2>&1 | tee build.log
        
    - name: Check build result
      run: |
        echo "=== Build Log (last 50 lines) ==="
        tail -50 build.log
        
        if [ -f "arch/arm64/boot/Image.gz-dtb" ]; then
          echo "Build successful!"
          ls -lh arch/arm64/boot/Image.gz-dtb
        else
          echo "Build failed - no kernel image generated"
          exit 1
        fi
        
    - name: Upload kernel artifacts
      uses: actions/upload-artifact@v4
      with:
        name: kernel-${{ env.TARGET_DEVICE }}
        path: |
          arch/arm64/boot/Image.gz-dtb
          build.log
          .config
        retention-days: 7
